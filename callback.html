<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ytautott — authorization</title>
<link rel="icon" type="image/png" href="icon.png">
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#18162e;color:#eee;line-height:1.6}
  .wrap{max-width:720px;margin:0 auto;padding:48px 24px}
  h1{font-size:1.5rem}
  code{display:block;background:#0e0c1e;border:1px solid #2e2a4a;border-radius:8px;padding:16px;word-break:break-all;margin:16px 0;font-size:1rem}
  button{background:#c42d78;color:#fff;border:0;border-radius:8px;padding:12px 20px;font-size:1rem;cursor:pointer}
  button:active{opacity:.8}
  .muted{color:#8a84a0;font-size:.9rem}
  .err{color:#ff7a9c}
</style>
</head>
<body>
<div class="wrap">
  <h1>Authorization received</h1>
  <div id="out"></div>
  <p class="muted">This page runs entirely in your browser; the code is not sent anywhere. Paste it into the ytautott CLI to finish connecting.</p>
</div>
<script>
const p = new URLSearchParams(location.search);
const out = document.getElementById('out');
const code = p.get('code');
const err = p.get('error');
if (err) {
  out.innerHTML = '<p class="err">Authorization failed: ' + err.replace(/[<>&]/g,'') + ' — ' + (p.get('error_description')||'').replace(/[<>&]/g,'') + '</p>';
} else if (code) {
  const c = document.createElement('code'); c.textContent = code;
  const b = document.createElement('button'); b.textContent = 'Copy code';
  b.onclick = () => navigator.clipboard.writeText(code).then(()=>{b.textContent='Copied ✓'});
  out.append('Your authorization code:', c, b);
  const next = document.createElement('p'); next.className='muted';
  next.textContent = 'Next: python -m ytt tiktok exchange --code <paste>';
  out.append(next);
} else {
  out.innerHTML = '<p class="err">No authorization code in URL.</p>';
}
</script>
</body>
</html>
